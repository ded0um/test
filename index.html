<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contrôle éclairage — Bâtiment 1</title>
<style>
  :root{
    --bg: #14171c;
    --panel: #1c2028;
    --panel-border: #2c313b;
    --ink: #d7dbe0;
    --muted: #7a8290;
    --accent: #f2a33c;
    --ok: #33c46a;
    --nok: #e5484d;
    --off: #05070a;
    --quai: #22262e;
  }
  *{box-sizing:border-box;}
  html, body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family: "JetBrains Mono","Consolas",monospace;
    padding:10px 14px;
    overflow:hidden;
    height:100vh;
  }
  @supports (height: 100dvh){
    body{ height:100dvh; }
  }
  .app{
    max-width:720px;
    margin:0 auto;
    height:100%;
    display:flex;
    flex-direction:column;
  }
  h1{
    flex:0 0 auto;
    font-size:1rem;
    letter-spacing:0.04em;
    color:var(--accent);
    text-transform:uppercase;
    margin:0 0 10px;
    text-align:center;
  }

  /* Écran d'accueil : choix de la cellule */
  .accueil{
    flex:1 1 auto;
    min-height:0;
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    grid-auto-rows:1fr;
    gap:12px;
  }
  .bouton-accueil{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:10px;
    color:var(--ink);
    font-family:inherit;
    font-size:1.05rem;
    letter-spacing:0.03em;
    text-transform:uppercase;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .bouton-accueil:hover, .bouton-accueil:active{
    border-color:var(--accent);
    color:var(--accent);
  }

  /* Bouton retour, superposé en haut à gauche de la vue plein écran */
  .retour{
    position:absolute;
    top:6px;
    left:6px;
    z-index:5;
    background:var(--panel);
    border:1px solid var(--panel-border);
    color:var(--muted);
    font-family:inherit;
    font-size:0.7rem;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
  }
  .retour:hover{color:var(--accent);border-color:var(--accent);}

  /* Zone du plan : occupe tout l'espace restant */
  .zone-plan{
    flex:1 1 auto;
    min-height:0;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
  }
  #cellules{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
  }

  /* Plan / cellules */
  .cellule{
    display:none;
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:8px;
    padding:10px 12px;
    width:100%;
    max-width:640px;
  }
  .cellule.actif{
    display:flex;
    flex-direction:column;
    max-width:100%;
    max-height:100%;
    margin:auto;
    animation: glisser 0.28s ease;
  }
  @keyframes glisser{
    from{ opacity:0; transform:translateX(18px); }
    to{ opacity:1; transform:translateX(0); }
  }
  .cellule h2{
    flex:0 0 auto;
    font-size:0.85rem;
    text-align:center;
    color:var(--accent);
    margin:0 0 6px;
    text-transform:uppercase;
    letter-spacing:0.05em;
  }
  .zone-titre{
    flex:0 0 auto;
    font-size:0.62rem;
    color:var(--muted);
    text-align:center;
    margin:4px 0;
    text-transform:uppercase;
    letter-spacing:0.08em;
  }
  .grille-stockage{
    flex:5 1 0;
    min-height:0;
    display:grid;
    gap:3px;
  }
  .grille-quai{
    flex:4 1 0;
    min-height:0;
    display:grid;
    gap:3px;
    background:var(--quai);
    padding:5px;
    border-radius:5px;
  }
  .lampe{
    position:relative;
    border-radius:3px;
    background:#2a2f38;
    border:1px solid #3a404b;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:clamp(8px, 2.4vh, 15px);
    font-weight:700;
    color:#000;
    cursor:pointer;
    user-select:none;
    transition:background .1s, border-color .1s;
  }
  .lampe:hover{border-color:var(--accent);}
  .lampe.nc{background:var(--nok); color:#2a0505;}
  .lampe.hs{background:var(--off); border-color:#000;}
  .vide{visibility:hidden;}
  .num{
    position:absolute;
    top:1px;
    left:2px;
    font-size:clamp(6px, 1.1vh, 10px);
    font-weight:400;
    color:#5a6270;
  }
  .lampe.nc .num{color:rgba(0,0,0,0.45);}
  .lampe.hs .num{color:#333;}

  .flux{
    flex:0 0 auto;
    text-align:center;
    font-size:0.58rem;
    color:var(--muted);
    margin-top:4px;
    letter-spacing:0.1em;
  }

  /* Stats sous le plan */
  .stats{
    flex:0 0 auto;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:center;
    margin-top:10px;
  }
  .stat{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:6px;
    padding:5px 10px;
    font-size:0.7rem;
    min-width:90px;
    text-align:center;
  }
  .stat b{display:block;font-size:1rem;letter-spacing:0.02em;}
  .stat.ok b{color:var(--ok);}
  .stat.nok b{color:var(--nok);}
  .stat.off b{color:var(--muted);}
  .stat.reste b{color:var(--accent);}
</style>
</head>
<body>
<div class="app">

  <h1>Contrôle éclairage — Bâtiment 1</h1>

  <div class="accueil" id="accueil"></div>

  <div class="zone-plan" id="zonePlan" style="display:none;">
    <button id="btnRetour" class="retour">← Cellules</button>
    <div id="cellules"></div>
  </div>

  <div class="stats" id="statsBar" style="display:none;">
    <div class="stat ok"><b id="cptC">0</b>Conforme (C)</div>
    <div class="stat nok"><b id="cptNC">0</b>Non conforme (NC)</div>
    <div class="stat off"><b id="cptHS">0</b>Neutralisé (noir)</div>
  </div>

</div>

<script>
const states = ['', 'nc', 'hs'];
const labels = ['', 'NC', ''];

function creerLampe(numero){
  const div = document.createElement('div');
  div.className = 'lampe';
  div.dataset.state = '0';
  div.dataset.numero = numero;

  const num = document.createElement('span');
  num.className = 'num';
  num.textContent = numero;
  div.appendChild(num);

  const lettre = document.createElement('span');
  lettre.className = 'lettre';
  div.appendChild(lettre);

  div.addEventListener('click', ()=>{
    let s = (parseInt(div.dataset.state) + 1) % 3;
    div.dataset.state = s;
    div.className = 'lampe' + (states[s] ? ' ' + states[s] : '');
    div.appendChild(num);
    lettre.textContent = labels[s];
    div.appendChild(lettre);
    updateStats();
  });
  return div;
}

function creerVide(){
  const div = document.createElement('div');
  div.className = 'vide';
  return div;
}

// Stockage : numérotation en colonnes -> number = (c-1)*rows + r + offset
// extraGauche : ajoute une colonne supplémentaire à gauche, peuplée uniquement sur la 1re ligne (lampe "?")
function creerGrilleStockage(cols, rows, offset, extraGauche){
  const g = document.createElement('div');
  g.className = 'grille-stockage';
  g.style.gridTemplateColumns = `repeat(${extraGauche ? cols+1 : cols}, 1fr)`;
  g.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
  for(let i=0;i<rows;i++){
    if(extraGauche){
      g.appendChild(i===0 ? creerLampe('?') : creerVide());
    }
    for(let j=0;j<cols;j++){
      const c = j+1;
      const r = rows - i;
      const numero = (c-1)*rows + r + offset;
      g.appendChild(creerLampe(numero));
    }
  }
  return g;
}

// Quai : numérotation en lignes -> number = (r-1)*cols + c
// extraDroite : ajoute une colonne supplémentaire à droite, peuplée uniquement sur la 1re ligne (lampe "?")
function creerGrilleQuai(cols, rows, extraDroite){
  const g = document.createElement('div');
  g.className = 'grille-quai';
  g.style.gridTemplateColumns = `repeat(${extraDroite ? cols+1 : cols}, 1fr)`;
  g.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
  for(let i=0;i<rows;i++){
    for(let j=0;j<cols;j++){
      const c = j+1;
      const r = rows - i;
      const numero = (r-1)*cols + c;
      g.appendChild(creerLampe(numero));
    }
    if(extraDroite){
      g.appendChild(i===0 ? creerLampe('?') : creerVide());
    }
  }
  return g;
}

const conteneurCellules = document.getElementById('cellules');
const conteneurAccueil = document.getElementById('accueil');
const zonePlan = document.getElementById('zonePlan');
const accueil = document.getElementById('accueil');

const statsBar = document.getElementById('statsBar');

function afficherCellule(id){
  accueil.style.display = 'none';
  zonePlan.style.display = 'flex';
  statsBar.style.display = 'flex';
  document.querySelectorAll('.cellule').forEach(c=>c.classList.remove('actif'));
  document.getElementById('cellule-'+id).classList.add('actif');
  ajusterTaille();
}

document.getElementById('btnRetour').addEventListener('click', ()=>{
  zonePlan.style.display = 'none';
  statsBar.style.display = 'none';
  accueil.style.display = 'grid';
});

function ajouterBoutonAccueil(id, libelle){
  const bouton = document.createElement('button');
  bouton.className = 'bouton-accueil';
  bouton.textContent = libelle;
  bouton.addEventListener('click', ()=> afficherCellule(id));
  conteneurAccueil.appendChild(bouton);
}

// Cellules 1 à 6 : stockage 10x5 + quai 9x4
const definitionsCellules = [1,2,3,4,5,6];
definitionsCellules.forEach((id, index)=>{
  const cell = document.createElement('div');
  cell.className = 'cellule';
  cell.id = 'cellule-' + id;

  const titre = document.createElement('h2');
  titre.textContent = 'Cellule ' + id;
  cell.appendChild(titre);

  const titreStock = document.createElement('div');
  titreStock.className = 'zone-titre';
  titreStock.textContent = 'Stockage';
  cell.appendChild(titreStock);
  cell.appendChild(creerGrilleStockage(10, 5, 0, id===1));

  const titreQuai = document.createElement('div');
  titreQuai.className = 'zone-titre';
  titreQuai.textContent = 'Quai';
  cell.appendChild(titreQuai);
  cell.appendChild(creerGrilleQuai(9, 4, id===6));

  const flux = document.createElement('div');
  flux.className = 'flux';
  flux.textContent = '↓ sens des quais ↓';
  cell.appendChild(flux);

  conteneurCellules.appendChild(cell);
  ajouterBoutonAccueil(id, 'Cellule ' + id);
});

// Cellule D+H réunies : deux grilles stockage 10x2, pas de quai
// Le "remplissage" invisible en flex:5 conserve la même hauteur de case
// que dans les cellules classiques (5 lignes stockage + 4 lignes quai = 9 unités)
const cellDH = document.createElement('div');
cellDH.className = 'cellule';
cellDH.id = 'cellule-DH';

const titreDH = document.createElement('h2');
titreDH.textContent = 'Cellules D + H';
cellDH.appendChild(titreDH);

const titreH = document.createElement('div');
titreH.className = 'zone-titre';
titreH.textContent = 'Stockage H';
cellDH.appendChild(titreH);
const grilleH = creerGrilleStockage(10, 2, 70, false);
grilleH.style.flex = '2 1 0';
cellDH.appendChild(grilleH);

const titreD = document.createElement('div');
titreD.className = 'zone-titre';
titreD.textContent = 'Stockage D';
cellDH.appendChild(titreD);
const grilleD = creerGrilleStockage(10, 2, 50, false);
grilleD.style.flex = '2 1 0';
cellDH.appendChild(grilleD);

const remplissage = document.createElement('div');
remplissage.style.flex = '5 1 0';
cellDH.appendChild(remplissage);

conteneurCellules.appendChild(cellDH);
ajouterBoutonAccueil('DH', 'Cellules D+H');

function updateStats(){
  const total = { c:0, nc:0, hs:0 };
  document.querySelectorAll('.lampe').forEach(l=>{
    const s = l.dataset.state;
    if(s==='0') total.c++;
    else if(s==='1') total.nc++;
    else if(s==='2') total.hs++;
  });
  document.getElementById('cptC').textContent = total.c;
  document.getElementById('cptNC').textContent = total.nc;
  document.getElementById('cptHS').textContent = total.hs;
}

// Lampes déjà neutralisées (noir) à l'ouverture de la page
const etatsInitiaux = {
  1: [28,29],
  2: [31],
  3: [27],
  4: [2,10,11,12,13],
  5: [31]
};
Object.keys(etatsInitiaux).forEach(id=>{
  const cell = document.getElementById('cellule-'+id);
  etatsInitiaux[id].forEach(numero=>{
    const lampe = cell.querySelector('.grille-quai .lampe[data-numero="'+numero+'"]');
    if(lampe){
      lampe.dataset.state = '2';
      lampe.className = 'lampe hs';
      const num = document.createElement('span');
      num.className = 'num';
      num.textContent = numero;
      const lettre = document.createElement('span');
      lettre.className = 'lettre';
      lampe.appendChild(num);
      lampe.appendChild(lettre);
    }
  });
});

updateStats();

// Calcule la plus grande taille possible pour la cellule active en conservant
// le ratio largeur/hauteur (10 colonnes pour 9 unités de hauteur), pour éviter
// toute déformation quel que soit l'écran ou l'orientation.
const RATIO = 10/9;
function ajusterTaille(){
  const conteneur = document.querySelector('.zone-plan');
  const w = conteneur.clientWidth;
  const h = conteneur.clientHeight;
  let cibleW, cibleH;
  if (w <= h){
    // Portrait (usage principal sur téléphone) : on remplit tout l'espace disponible
    cibleW = w;
    cibleH = h;
  } else if (w / h > RATIO){
    // Paysage très large : on limite la largeur pour éviter l'écrasement
    cibleH = h;
    cibleW = h * RATIO;
  } else {
    cibleW = w;
    cibleH = w / RATIO;
  }
  document.querySelectorAll('.cellule').forEach(c=>{
    c.style.width = cibleW + 'px';
    c.style.height = cibleH + 'px';
  });
}
window.addEventListener('resize', ajusterTaille);
window.addEventListener('orientationchange', ()=> setTimeout(ajusterTaille, 150));
ajusterTaille();
</script>
</body>
</html>
